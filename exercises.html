    .week-grid {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 10px;
}

.week-card {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-decoration: none;
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 20px;
    padding: 20px;
    box-shadow: var(--shadow-soft);
    transition: 0.3s;
    color: inherit;
    text-align: center;
    aspect-ratio: 1 / 1;
}

.week-card:hover {
    transform: translateY(-5px);
    box-shadow: var(--shadow-card);
    border-color: var(--primary);
    background: #fcfdff;
}

.week-number {
    width: 54px;
    height: 54px;
    margin: 0 auto 14px;

    border: 2px solid var(--navy);

    align-items: center;

}

.week-text {

}

.week-title {

}

.week-desc {

    line-height: 1.35;
}

<script>
    // DATABASE
    const curriculum = {
        "Sep": { 
            title: "My School", 
            wiki: "<b>Educational Goal:</b> Learn greetings ('Hello') and school objects (bag, book). Focus on listening to classroom commands and recognizing the letter Bb.<br><b>教學目標：</b>學習打招呼 ('Hello') 和學校物品 (bag, book)。重點學習聽從課堂指令及認識字母 Bb。", 
            weeks: ["Greetings", "School Objects", "Phonics Bb", "Review: First Day"] 
        },
        "Oct": { 
            title: "My Friends", 
            wiki: "<b>Educational Goal:</b> Understand gender (boy/girl) and friendship. Learn to line up and recognize the letter Gg.<br><b>教學目標：</b>理解性別 (boy/girl) 和朋友概念。學習排隊 (line up) 及認識字母 Gg。", 
            weeks: ["Boy or Girl?", "My Friend", "Phonics Gg", "Messy Family"] 
        },
        "Nov": { 
            title: "My Face", 
            wiki: "<b>Educational Goal:</b> Learn facial features (eye, ear, mouth, nose) and personal hygiene. Recognize the letter Mm.<br><b>教學目標：</b>認識五官 (eye, ear, mouth, nose) 和個人衛生。認識字母 Mm。", 
            weeks: ["Face Song", "Funny Faces", "Phonics Mm", "Buzz! Buzz!"] 
        },
        "Dec": { 
            title: "On the Farm", 
            wiki: "<b>Educational Goal:</b> Learn numbers 1-3 and farm animal vocabulary (cow, pig, duck). Recognize the letter Pp.<br><b>教學目標：</b>學習數字 1-3 和農場動物 (cow, pig, duck)。認識字母 Pp。", 
            weeks: ["Farm Animals", "Counting 1-2-3", "Phonics Pp", "Farm Review"] 
        },
        "Jan": { 
            title: "At the Zoo", 
            wiki: "<b>Educational Goal:</b> Learn about wild animals (panda, tiger) and numbers 4-5. Understand public rules and recognize the letter Tt.<br><b>教學目標：</b>認識野生動物 (panda, tiger) 和數字 4-5。理解公共場所規則及認識字母 Tt。", 
            weeks: ["Zoo Visit", "Photo Time", "Phonics Tt", "Zoo Rules"] 
        },
        "Feb": { 
            title: "On the Road", 
            wiki: "<b>Educational Goal:</b> Learn transportation vocabulary (bus, car) and traffic safety rules (stop/go). Recognize the letter Cc.<br><b>教學目標：</b>認識交通工具 (bus, car) 和交通安全規則 (stop/go)。認識字母 Cc。", 
            weeks: ["Transport", "Oops! My Bike", "Phonics Cc", "Traffic Lights"] 
        },
       "Mar": { 
            title: "Family Visit", 
            wiki: "<b>Educational Goal:</b> Learn family members (grandma, grandpa) and polite greetings ('How are you?'). Recognize the letter Uu.<br><b>教學目標：</b>認識家庭成員 (grandma, grandpa) 和禮貌問候 ('How are you?')。認識字母 Uu。", 
            weeks: ["A Visit", "Family", "Phonics Uu", "Family Review"] 
        },
        "Apr": { 
            title: "My Pets", 
            wiki: "<b>Educational Goal:</b> Learn pet vocabulary (bird, rabbit) and express possession using 'I have...'. Recognize the letter Rr.<br><b>教學目標：</b>認識寵物 (bird, rabbit) 和使用 'I have...' 表達擁有。認識字母 Rr。", 
            weeks: ["My Pets", "Fast & Slow", "Phonics Rr", "Pets Review"] 
        },
        "May": { 
            title: "Color Fun", 
            wiki: "<b>Educational Goal:</b> Identify colors (red, blue) and ask questions ('What color is it?'). Recognize the letter Oo.<br><b>教學目標：</b>認識顏色 (red, blue) 和提問 ('What color is it?')。認識字母 Oo。", 
            weeks: ["Rainbow", "Colors", "Phonics Oo", "Color Review"] 
        },
        "Jun": { 
            title: "In the Park", 
            wiki: "<b>Educational Goal:</b> Learn nature vocabulary (flower, grass, park, insect, kite, tree). Describe objects using simple color sentences and begin phonics with the letter Ii.<br><b>教學目標：</b>學習大自然相關詞彙 (flower, grass, park, insect, kite, tree)。能用簡單句型描述物品與顏色，並開始學習字母 Ii 的自然發音。", 
            weeks: ["Nature", "Park Fun", "Phonics Ii", "Park Review"] 
        },
        "Jul": { 
            title: "Yummy Food", 
            wiki: "<b>Educational Goal:</b> Learn food and drink vocabulary (bread, cake, juice, milk, water). Express preferences using 'I like...' and practice phonics with the letter Jj.<br><b>教學目標：</b>學習食物與飲品詞彙 (bread, cake, juice, milk, water)。能用 'I like...' 表達喜好，並練習字母 Jj 的自然發音。", 
            weeks: ["Yummy", "Drinks", "Phonics Jj", "Food Review"] 
        },
        "Aug": { 
            title: "Fruit & Numbers", 
            wiki: "<b>Educational Goal:</b> Learn fruit vocabulary (apple, banana, pear, orange). Practice counting from 4 to 10 and use simple quantity sentences (e.g., 'I have five apples.').<br><b>教學目標：</b>學習水果詞彙 (apple, banana, pear, orange)。練習 4 到 10 的數字，並能用簡單句型表達數量 (例如 'I have five apples.')。", 
            weeks: ["I Like Fruit", "Fruit", "Ten Pears", "Fruit Review"] 
        }
    };

    const monthListEl = document.getElementById('month-list');
    const contentAreaEl = document.getElementById('content-area');

        const HOMEWORK_MONTH_KEY = 'll_homework_active_month';
        
        function init() {
          const months = ["Sep", "Oct", "Nov", "Dec", "Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug"];
          const requestedMonth = new URLSearchParams(window.location.search).get('m');
          const savedMonth = localStorage.getItem(HOMEWORK_MONTH_KEY);
        
          const initialMonth = months.includes(requestedMonth)
            ? requestedMonth
            : months.includes(savedMonth)
              ? savedMonth
              : months[0];
        
          months.forEach(month => {
            const btn = document.createElement('button');
            btn.className = 'month-btn';
            btn.textContent = month;
            btn.dataset.month = month;
            btn.onclick = () => loadMonth(month, btn);
            monthListEl.appendChild(btn);
          });
        
          const initialBtn = monthListEl.querySelector(
            `.month-btn[data-month="${initialMonth}"]`
          );
        
          loadMonth(initialMonth, initialBtn);
        }
        
        function loadMonth(monthKey, btn) {
          const data = curriculum[monthKey];
          if (!data) return;
        
          localStorage.setItem(HOMEWORK_MONTH_KEY, monthKey);
        
          const url = new URL(window.location.href);
          url.searchParams.set('m', monthKey);
          history.replaceState(null, '', url);
        
          document.querySelectorAll('.month-btn').forEach(button => {
            button.classList.remove('active');
          });
        
          if (btn) btn.classList.add('active');
        
          let html = `
            <div class="wiki-box">
              <div class="wiki-title">Parent's Corner</div>
              <div class="wiki-content">${data.wiki}</div>
            </div>
        
            <div class="week-grid">
          `;
        
          data.weeks.forEach((weekTitle, index) => {
            html += `
              <a href="lesson.html?m=${monthKey}&w=${index}" class="week-card">
                <div class="week-number">${index + 1}</div>
        
                <div class="week-text">
                  <span class="week-title">Week ${index + 1}</span>
                  <span class="week-desc">${weekTitle}</span>
                </div>
              </a>
            `;
          });
        
          html += `</div>`;
          contentAreaEl.innerHTML = html;
        }
        
            init();
</script>
