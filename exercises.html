<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homework — LinguaLab</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet" />

<style>
  :root {
    --primary: #22d3ee;
    --primary-light: #ecfeff;
    --accent: #f97316;
    --navy: #1f4e79;
    --bg: #f8fafc;
    --radius: 24px;
    --text: #0f172a;
    --muted: #64748b;
    --line: #e2e8f0;
    --shadow-soft: 0 4px 15px rgba(0,0,0,0.04);
    --shadow-card: 0 20px 40px rgba(0,0,0,0.08);
    --c1: #e0f2fe;
    --c2: #dcfce7;
    --c3: #fef3c7;
    --c4: #fee2e2;
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  html,
  body {
    overflow-x: hidden;
  }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    padding-top: 80px;
  }

  .navbar-left,
  .navbar-right,
  .hero-copy,
  .content-wrapper,
  .month-container,
  .wiki-box,
  .week-grid,
  .week-card,
  .footer-text {
    min-width: 0;
  }

  .navbar-right a,
  .hero-copy,
  .hero-copy .cn-line,
  .wiki-title,
  .wiki-content,
  .month-btn,
  .week-title,
  .week-desc,
  .footer-text {
    overflow-wrap: anywhere;
    word-break: break-word;
  }

  /* NAVBAR */
  .navbar {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 15px 40px;
    background: #fff;
    box-shadow: 0 4px 20px rgba(0,0,0,.05);
    height: 80px;
  }

  .navbar-left {
    display: flex;
    align-items: center;
    gap: 12px;
    text-decoration: none;
  }

  .nav-logo {
    height: 50px;
    width: auto;
    display: block;
  }

  .nav-title {
    font-size: 24px;
    font-weight: 800;
    color: var(--navy);
    line-height: 1.1;
  }

  .navbar-right {
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .navbar-right a {
    color: var(--navy);
    font-weight: 600;
    text-decoration: none;
    font-size: 14px;
    transition: 0.3s;
  }

  .navbar-right a:hover {
    color: var(--accent);
  }

  /* HERO */
  .hero-compact {
    padding: 60px 8% 140px;
    text-align: center;
    background: linear-gradient(135deg, var(--primary), #a78bfa);
    color: #fff;
    width: 100%;
  }

  .hero-compact h1 {
    font-size: 42px;
    font-weight: 800;
    margin-bottom: 10px;
    line-height: 1.15;
  }

  .hero-info {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 20px;
    font-size: 18px;
    flex-wrap: wrap;
  }

  .hero-copy {
    max-width: 760px;
    line-height: 1.6;
    font-size: 17px;
  }

  .hero-copy .cn-line {
    display: block;
    font-size: 16px;
    font-weight: 400;
    opacity: 0.92;
    margin-top: 6px;
    line-height: 1.55;
  }

  /* CONTENT WRAPPER */
  .content-wrapper {
    max-width: 1100px;
    margin: -100px auto 50px;
    position: relative;
    z-index: 10;
    padding: 0 20px;
  }

  /* MONTH BUTTONS */
  .month-container {
    background: #fff;
    border-radius: var(--radius);
    padding: 30px 32px;
    box-shadow: var(--shadow-card);
    margin-bottom: 40px;
    border: 1px solid var(--line);
    text-align: center;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    align-items: center;
    gap: 10px;
  }

  .month-btn {
    flex: 0 0 auto;
    border: none;
    padding: 12px 20px;
    border-radius: 999px;
    cursor: pointer;
    font-weight: 800;
    color: #475569;
    transition: 0.2s;
    font-size: 15px;
    min-width: 72px;
    text-align: center;
    background: #f1f5f9;
    line-height: 1.25;
  }

  .month-btn:hover {
    transform: translateY(-2px);
    filter: brightness(0.97);
  }

  .month-btn.active {
    background: var(--navy);
    color: #fff;
    box-shadow: 0 4px 15px rgba(31, 78, 121, 0.3);
    transform: scale(1.04);
  }

  /* WIKI BOX */
  .wiki-box {
    background: #fff7ed;
    border-left: 5px solid var(--accent);
    padding: 30px;
    border-radius: 20px;
    margin-bottom: 30px;
    box-shadow: var(--shadow-soft);
  }

  .wiki-title {
    font-weight: 800;
    color: #c2410c;
    margin-bottom: 10px;
    text-transform: uppercase;
    font-size: 13px;
    letter-spacing: 1px;
    line-height: 1.35;
  }

  .wiki-content {
    font-size: 16px;
    line-height: 1.7;
    color: #431407;
  }

  /* WEEK GRID */
  .week-grid {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 20px;
  }

  .week-card {
    background: #fff;
    border-radius: var(--radius);
    padding: 30px 20px;
    text-align: center;
    cursor: pointer;
    border: 2px solid transparent;
    box-shadow: 0 4px 15px rgba(0,0,0,0.04);
    transition: 0.3s;
    text-decoration: none;
    color: inherit;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    min-height: 220px;
  }

  .week-card:hover {
    transform: translateY(-5px);
    border-color: var(--primary);
    box-shadow: 0 20px 40px rgba(34, 211, 238, 0.15);
  }

  .week-number {
    font-size: 20px;
    font-weight: 800;
    color: var(--primary);
    background: var(--primary-light);
    width: 52px;
    height: 52px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 15px;
    line-height: 1;
    flex-shrink: 0;
  }

  .week-title {
    font-size: 18px;
    margin-bottom: 8px;
    font-weight: 800;
    color: var(--navy);
    line-height: 1.35;
  }

  .week-desc {
    font-size: 15px;
    opacity: 0.78;
    font-weight: 600;
    line-height: 1.55;
  }

  .coming-soon {
    opacity: 0.5;
    pointer-events: none;
    border: 1px dashed #cbd5e1;
    background: #f8fafc;
    box-shadow: none;
  }

  /* FOOTER */
  footer {
    background: #0f172a;
    color: #94a3b8;
    padding: 40px 8%;
    text-align: center;
    margin-top: 50px;
  }

  .footer-link {
    color: #f97316;
    text-decoration: none !important;
  }

  .footer-text {
    font-size: 14px;
    line-height: 1.65;
    margin-top: 8px;
  }

  /* TABLET */
  @media (max-width: 1024px) {
    .navbar {
      padding: 12px 24px;
    }

    .nav-title {
      font-size: 22px;
    }

    .navbar-right {
      gap: 14px;
    }

    .navbar-right a {
      font-size: 13px;
    }

    .hero-compact {
      padding: 56px 6% 130px;
    }

    .hero-compact h1 {
      font-size: 38px;
    }

    .hero-copy {
      font-size: 16px;
      line-height: 1.62;
    }

    .hero-copy .cn-line {
      font-size: 15px;
    }

    .content-wrapper {
      padding: 0 16px;
    }

    .month-container {
      padding: 24px;
    }

    .wiki-box {
      padding: 24px;
    }

    .wiki-content {
      font-size: 15px;
      line-height: 1.65;
    }

    .week-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
    }

    .week-card {
      min-height: 210px;
      padding: 26px 18px;
    }
  }

  /* MOBILE */
  @media (max-width: 700px) {
    body {
      padding-top: 128px;
    }

    .navbar {
      padding: 10px 16px;
      flex-direction: column;
      gap: 10px;
      height: auto;
    }

    .navbar-left {
      width: 100%;
      justify-content: center;
    }

    .navbar-right {
      width: 100%;
      justify-content: center;
      flex-wrap: wrap;
      gap: 10px 12px;
      border-top: 1px solid #f1f5f9;
      padding-top: 10px;
    }

    .navbar-right a {
      font-size: 13px;
      text-align: center;
      white-space: normal;
    }

    .nav-logo {
      height: 40px;
    }

    .nav-title {
      font-size: 20px;
    }

    .hero-compact {
      padding: 46px 16px 110px;
    }

    .hero-compact h1 {
      font-size: 30px;
      line-height: 1.2;
    }

    .hero-copy {
      font-size: 16px;
      line-height: 1.65;
    }

    .hero-copy .cn-line {
      font-size: 15px;
      line-height: 1.55;
    }

    .content-wrapper {
      margin-top: -72px;
      padding: 0 14px;
    }

    .month-container {
      padding: 18px;
      gap: 10px;
      margin-bottom: 24px;
    }

    .month-btn {
      width: calc(50% - 5px);
      min-width: 0;
      padding: 12px 14px;
      font-size: 14px;
      flex-grow: 0;
    }

    .wiki-box {
      padding: 20px 18px;
      border-radius: 18px;
      margin-bottom: 24px;
    }

    .wiki-title {
      font-size: 12px;
    }

    .wiki-content {
      font-size: 15px;
      line-height: 1.7;
    }

    .week-grid {
      grid-template-columns: 1fr;
      gap: 16px;
    }

    .week-card {
      min-height: 0;
      padding: 24px 18px;
    }

    .week-number {
      width: 48px;
      height: 48px;
      font-size: 18px;
      margin-bottom: 14px;
    }

    .week-title {
      font-size: 18px;
      line-height: 1.35;
    }

    .week-desc {
      font-size: 15px;
      line-height: 1.6;
    }

    .footer-text {
      font-size: 14px;
      line-height: 1.6;
    }
  }

  @media (max-width: 420px) {
    .month-btn {
      width: 100%;
    }
  }
</style>
</head>
<body>

<header class="navbar">
    <div class="navbar-left">
        <img src="assets/img/logo.png" alt="LL" class="nav-logo" onerror="this.style.display='none'">
        <span class="nav-title">LinguaLab</span>
    </div>
    <nav class="navbar-right">
        <a href="grammar.html">Grammar Magic</a>
        <a href="vocabulary.html">Word Bank</a>
        <a href="index.html">Main Page</a>
        <a href="parents.html">Wiki Parents</a>
    </nav>
</header>

<section class="hero-compact">
    <h1>Fun Homework</h1>
    <div class="hero-info">
        <div class="hero-copy">
            Select a month to start your mission
            <span class="cn-line">选择一个月份，开始你的学习任务吧！</span>
        </div>
    </div>
</section>

<div class="content-wrapper">
    <div class="month-container" id="month-list"></div>

    <div id="content-area"></div>
</div>

<footer>
    <div class="footer-links">
        <a href="privacy.html" class="footer-link">Privacy Policy</a>
    </div>
  
    <div class="footer-text">
      © 2026 LinguaLab • Small lessons. Real progress. All rights reserved.
    </div>
  </footer>

<script>
    // DATA BASE
    const curriculum = {
        "Sep": { 
            title: "September: My School", 
            wiki: "<b>Educational Goal:</b> Greetings & School Objects. We focus on listening to classroom commands and recognizing the letter 'B'.<br><b>教學目標：</b>學習打招呼 (Hello) 和學校物品 (Bag, Book)。重點學習字母 B。", 
            weeks: ["Greetings", "School Objects", "Phonics Bb", "Review: First Day"] 
        },
        "Oct": { 
            title: "October: My Friends", 
            wiki: "<b>Educational Goal:</b> Understanding gender (boy/girl) and friendship.<br><b>教學目標：</b>理解性別 (Boy/Girl) 和朋友。學習排隊 (Line up) 和字母 G。", 
            weeks: ["Boy or Girl?", "My Friend", "Phonics Gg", "Messy Family"] 
        },
        "Nov": { 
            title: "November: My Face", 
            wiki: "<b>Educational Goal:</b> Learn facial parts (eyes, ears, mouth, nose) and hygiene.<br><b>教學目標：</b>認識五官 (Eye, Ear, Mouth, Nose) 和字母 M。", 
            weeks: ["Face Song", "Funny Faces", "Phonics Mm", "Buzz! Buzz!"] 
        },
        "Dec": { 
            title: "December: On the Farm", 
            wiki: "<b>Educational Goal:</b> Understanding numbers 1-3 and farm animals.<br><b>教學目標：</b>學習數字 1-3 和農場動物 (Cow, Pig, Duck)。", 
            weeks: ["Farm Animals", "Counting 1-2-3", "Phonics Pp", "Winter Review"] 
        },
        "Jan": { 
            title: "January: At the Zoo", 
            wiki: "<b>Educational Goal:</b> Wild animals and numbers 4-5. Public rules.<br><b>教學目標：</b>認識野生動物 (Panda, Tiger) 和數字 4-5。學習字母 T。", 
            weeks: ["Zoo Visit", "Photo Time", "Phonics Tt", "Zoo Rules"] 
        },
        "Feb": { 
            title: "February: On the Road", 
            wiki: "<b>Educational Goal:</b> Transport names and traffic safety (Stop/Go).<br><b>教學目標：</b>認識交通工具 (Bus, Car) 和交通規則。學習字母 C。", 
            weeks: ["Transport", "Oops! My Bike", "Phonics Cc", "Traffic Lights"] 
        },
        
        "Mar": { title: "March", wiki: "Content under development...", weeks: ["Coming Soon", "Coming Soon", "Coming Soon", "Coming Soon"], active: false },
        "Apr": { title: "April", wiki: "Content under development...", weeks: ["Coming Soon", "Coming Soon", "Coming Soon", "Coming Soon"], active: false },
        "May": { title: "May", wiki: "Content under development...", weeks: ["Coming Soon", "Coming Soon", "Coming Soon", "Coming Soon"], active: false },
        "Jun": { title: "June", wiki: "Content under development...", weeks: ["Coming Soon", "Coming Soon", "Coming Soon", "Coming Soon"], active: false },
        "Jul": { title: "July", wiki: "Content under development...", weeks: ["Coming Soon", "Coming Soon", "Coming Soon", "Coming Soon"], active: false },
        "Aug": { title: "August", wiki: "Content under development...", weeks: ["Coming Soon", "Coming Soon", "Coming Soon", "Coming Soon"], active: false }
    };

    const monthListEl = document.getElementById('month-list');
    const contentAreaEl = document.getElementById('content-area');
    const y = document.getElementById('year');
    if (y) y.textContent = String(new Date().getFullYear());

    function init() {
        const months = ["Sep", "Oct", "Nov", "Dec", "Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug"];
        
        months.forEach((m, index) => {
            const btn = document.createElement('button');
            btn.className = 'month-btn';
            btn.innerText = m;
            
            if (index === 0) {
                btn.classList.add('active');
                loadMonth(m, btn);
            }

            btn.onclick = () => loadMonth(m, btn);
            monthListEl.appendChild(btn);
        });
    }

    function loadMonth(monthKey, btn) {
        document.querySelectorAll('.month-btn').forEach(b => b.classList.remove('active'));
        if(btn) btn.classList.add('active');

        const data = curriculum[monthKey];
        const isComingSoon = data.active === false;

        let html = `
            <div class="wiki-box">
                <div class="wiki-title">Parent's Corner</div>
                <div class="wiki-content">${data.wiki}</div>
            </div>
            <div class="week-grid">
        `;

        data.weeks.forEach((weekTitle, index) => {
            const cardClass = isComingSoon ? "week-card coming-soon" : "week-card";
            const link = isComingSoon ? "#" : `lesson.html?m=${monthKey}&w=${index}`;
            
            html += `
                <a href="${link}" class="${cardClass}">
                    <div class="week-number">${index + 1}</div>
                    <span class="week-title">Week ${index + 1}</span>
                    <span class="week-desc">${weekTitle}</span>
                </a>
            `;
        });
        html += `</div>`;
        contentAreaEl.innerHTML = html;
    }

    init();
</script>
</body>
</html>
