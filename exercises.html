<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homework — LinguaLab</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet" />

    <style>
        :root { 
            --primary: #22d3ee; 
            --primary-light: #ecfeff;
            --accent: #f97316;
            --navy: #1f4e79; 
            --bg: #f8fafc; 
            --white: #ffffff; 
            --orange: #f97316; 
            --green: #10b981;
            --radius: 24px;
            --text: #0f172a;
            --muted: #64748b;
            --line: #e2e8f0;
            --shadow: 0 10px 30px rgba(0,0,0,0.08);
            --shadow-soft: 0 4px 15px rgba(0,0,0,0.04);
            --shadow-card: 0 20px 40px rgba(0,0,0,0.08);
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        html, body { overflow-x: hidden; }

        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            line-height: 1.6; 
            padding-top: 80px; 
            padding-bottom: 90px; /* Место для нижней панели */
        }

        .navbar-left, .navbar-right, .hero-info { min-width: 0; }
        .navbar-right a, .hero-info { overflow-wrap: anywhere; word-break: break-word; }
        
        /* --- ICONS --- */
        .icon { width: 24px; height: 24px; fill: currentColor; vertical-align: text-bottom; }

        /* --- NAVBAR --- */
        .navbar {
            position: fixed; top: 0; left: 0; width: 100%; z-index: 1000;
            display: flex; align-items: center; justify-content: space-between;
            padding: 15px 40px; background: #fff; box-shadow: 0 4px 20px rgba(0,0,0,.05);
            height: 80px;
        }
        .navbar-left { display: flex; align-items: center; gap: 12px; text-decoration: none; }
        .nav-logo { height: 40px; width: auto; display: block; }
        .nav-title { font-size: 24px; font-weight: 800; color: var(--navy); line-height: 1.1; }
        .navbar-right { display: flex; align-items: center; gap: 20px; }
        .navbar-right a { color: var(--navy); font-weight: 600; text-decoration: none; font-size: 14px; transition: 0.3s; }
        .navbar-right a:hover { color: var(--accent); }

        /* PARENT TOGGLE */
        .parent-switch {
            display: flex; align-items: center; gap: 8px; 
            background: #f1f5f9; padding: 6px 12px; border-radius: 99px; cursor: pointer; border: 1px solid #e2e8f0;
        }
        .parent-switch.active { background: var(--navy); color: white; border-color: var(--navy); }
        .switch-label { font-size: 12px; font-weight: 700; text-transform: uppercase; }

        /* --- PROGRESS BAR --- */
        .progress-container {
            position: fixed; top: 80px; left: 0; width: 100%; height: 6px; background: #e2e8f0; z-index: 999;
        }
        .progress-fill { height: 100%; background: var(--orange); width: 0%; transition: width 0.5s ease; }

        /* --- HERO COMPACT --- */
        .hero-compact {
            padding: 60px 8% 140px;
            text-align: center;
            background: linear-gradient(135deg, var(--primary), #a78bfa);
            color: #fff;
            width: 100%;
        }
        .hero-compact h1 { font-size: 42px; font-weight: 800; margin-bottom: 10px; line-height: 1.15; }
        .hero-info { display: flex; justify-content: center; align-items: center; gap: 20px; font-size: 18px; opacity: 0.95; }

        /* --- CONTAINER --- */
        .container { 
            max-width: 700px; margin: -100px auto 0; 
            padding: 0 20px; position: relative; z-index: 10;
        }

        /* --- CARDS & SCREENS --- */
        .screen { display: none; animation: fadeUp 0.4s ease; }
        .screen.active { display: block; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card {
            background: white; border-radius: var(--radius); padding: 40px;
            box-shadow: var(--shadow-card); margin-bottom: 30px; text-align: center;
            border: 1px solid var(--line);
        }

        /* --- START SCREEN --- */
        .trust-badges { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .badge { background: #f0f9ff; color: var(--navy); padding: 6px 14px; border-radius: 8px; font-size: 12px; font-weight: 700; }
        
        .promise-box { margin: 25px 0; text-align: left; background: #f8fafc; padding: 20px; border-radius: 16px; }
        .promise-item { display: flex; gap: 10px; margin-bottom: 12px; font-size: 15px; color: #475569; align-items: center; }
        .check-icon { color: var(--green); font-weight: bold; }

        /* --- LESSON STEPS --- */
        .step-header { margin-bottom: 20px; }
        .step-tag { 
            color: var(--primary); font-weight: 800; text-transform: uppercase; 
            font-size: 12px; letter-spacing: 1px; display: block; margin-bottom: 5px;
        }
        .step-title { font-size: 28px; font-weight: 800; color: var(--navy); line-height: 1.3; }
        
        .parent-tip {
            display: none; text-align: left; background: #fff7ed; 
            border-left: 4px solid var(--orange); padding: 15px; 
            border-radius: 8px; margin-bottom: 25px; font-size: 14px; color: #9a3412;
        }
        
        /* Flashcards Grid */
        .flashcards-grid{ display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 15px; margin: 20px 0; }
        .flashcard{
            background: #f8fafc; border: 2px solid #e2e8f0; border-radius: 16px;
            cursor: pointer; transition: 0.2s; aspect-ratio: 1 / 1; width: 100%; padding: 12px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; position: relative; overflow: hidden;
        }
        .flashcard:hover{ border-color: var(--primary); background: #ecfeff; transform: scale(1.03); }
        .fc-img{ width: 68%; height: 52%; object-fit: contain; display: block; margin: 0 auto 10px; }
        .fc-icon{ font-size: 34px; display: block; margin-bottom: 8px; }
        .fc-word{ font-weight: 700; color: var(--navy); font-size: 14px; }
        .flashcard-zh{ font-size: 12px; color: #64748b; margin-bottom: 5px; }

        /* Audio Controls */
        .audio-control {
            background: #f1f5f9; padding: 20px; border-radius: 16px; 
            display: flex; align-items: center; gap: 15px; margin: 20px 0;
        }
        .play-btn {
            width: 50px; height: 50px; border-radius: 50%; border: none; background: var(--primary); 
            color: white; cursor: pointer; display: flex; justify-content: center; align-items: center; flex-shrink: 0;
        }
        .mic-btn {
            width: 60px; height: 60px; border-radius: 50%; border: none; background: #ef4444; 
            color: white; cursor: pointer; display: flex; justify-content: center; align-items: center;
            box-shadow: 0 4px 10px rgba(239, 68, 68, 0.3); transition: 0.2s; flex-shrink: 0;
        }
        .mic-btn:hover { transform: scale(1.1); }
        .mic-btn.recording { animation: pulse 1.5s infinite; background: #b91c1c; }

        /* Offscreen Mission */
        .mission-box {
            border: 2px dashed #cbd5e1; padding: 20px; border-radius: 16px; margin: 20px 0;
            background: #f8fafc; color: #475569;
        }

        /* Footer Nav (Bottom Bar) */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; width: 100%; 
            background: white; padding: 15px 20px; 
            border-top: 1px solid #e2e8f0; display: flex; gap: 10px; z-index: 1000;
            justify-content: center; box-shadow: 0 -4px 15px rgba(0,0,0,0.03);
        }
        .nav-btn {
            background: var(--navy); color: white; border: none; 
            padding: 16px 32px; border-radius: 14px; font-size: 16px; 
            font-weight: 700; cursor: pointer; width: 100%; max-width: 600px; transition: 0.2s;
        }
        .nav-btn:hover { background: #334155; }
        .nav-btn.secondary { background: white; color: var(--navy); border: 2px solid #e2e8f0; }

        /* REPORT CARD */
        .report-list { text-align: left; margin: 20px 0; border: 1px solid #e2e8f0; border-radius: 12px; padding: 20px; }
        .report-item { margin-bottom: 10px; font-size: 15px; color: #334155; display: flex; align-items: center; gap: 10px; }

        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.6); } 70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); } }

        /* --- RESPONSIVE TABLET --- */
        @media (max-width: 1024px) {
            .navbar { padding: 12px 24px; }
            .nav-title { font-size: 22px; }
            .navbar-right { gap: 14px; }
            .navbar-right a { font-size: 13px; }
            .hero-compact { padding: 56px 6% 130px; }
            .hero-compact h1 { font-size: 38px; }
        }

        /* --- RESPONSIVE MOBILE --- */
        @media (max-width: 700px) {
            body { padding-top: 128px; }
            
            .navbar { padding: 10px 16px; flex-direction: column; gap: 10px; height: auto; }
            .navbar-left { width: 100%; justify-content: center; }
            .navbar-right { width: 100%; justify-content: center; flex-wrap: wrap; gap: 10px 12px; border-top: 1px solid #f1f5f9; padding-top: 10px; }
            .navbar-right a { font-size: 13px; text-align: center; white-space: normal; }
            
            .nav-logo { height: 40px; }
            .nav-title { font-size: 20px; }
            
            .progress-container { top: 110px; } /* Сдвигаем из-за высокой мобильной навигации */
            
            .hero-compact { padding: 46px 16px 110px; }
            .hero-compact h1 { font-size: 30px; line-height: 1.2; }
            
            .container { margin-top: -72px; padding: 0 14px; }
            
            .card { padding: 25px 20px; } /* Меньше отступов внутри карточки на мобильном */
            .step-title { font-size: 24px; }
            
            .flashcards-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
            
            .audio-control { flex-direction: column; text-align: center; padding: 15px; }
            
            .bottom-nav { padding: 12px 15px; }
            .nav-btn { padding: 14px 20px; font-size: 15px; }
        }
    </style>
</head>
<body>

<header class="navbar">
    <div class="navbar-left">
        <img src="assets/img/logo.png" alt="LL" class="nav-logo" onerror="this.style.display='none'">
        <span class="nav-title">LinguaLab</span>
    </div>
    <nav class="navbar-right">
        <a href="grammar.html">Grammar Magic</a>
        <a href="vocabulary.html">Word Bank</a>
        <a href="index.html">Main Page</a>
        <a href="parents.html">Wiki Parents</a>
    </nav>
</header>

<section class="hero-compact">
    <h1>Fun Homework</h1>
    <div class="hero-info">
        <div class="hero-copy">
            Select a month to start your mission
            <span class="cn-line">选择一个月份，开始你的学习任务吧！</span>
        </div>
    </div>
</section>

<div class="content-wrapper">
    <div class="month-container" id="month-list"></div>

    <div id="content-area"></div>
</div>

<footer>
    <div class="footer-links">
        <a href="privacy.html" class="footer-link">Privacy Policy</a>
    </div>
  
    <div class="footer-text">
      © 2026 LinguaLab • Small lessons. Real progress. All rights reserved.
    </div>
  </footer>

<script>
    // DATA BASE
    const curriculum = {
        "Sep": { 
            title: "September: My School", 
            wiki: "<b>Educational Goal:</b> Greetings & School Objects. We focus on listening to classroom commands and recognizing the letter 'B'.<br><b>教學目標：</b>學習打招呼 (Hello) 和學校物品 (Bag, Book)。重點學習字母 B。", 
            weeks: ["Greetings", "School Objects", "Phonics Bb", "Review: First Day"] 
        },
        "Oct": { 
            title: "October: My Friends", 
            wiki: "<b>Educational Goal:</b> Understanding gender (boy/girl) and friendship.<br><b>教學目標：</b>理解性別 (Boy/Girl) 和朋友。學習排隊 (Line up) 和字母 G。", 
            weeks: ["Boy or Girl?", "My Friend", "Phonics Gg", "Messy Family"] 
        },
        "Nov": { 
            title: "November: My Face", 
            wiki: "<b>Educational Goal:</b> Learn facial parts (eyes, ears, mouth, nose) and hygiene.<br><b>教學目標：</b>認識五官 (Eye, Ear, Mouth, Nose) 和字母 M。", 
            weeks: ["Face Song", "Funny Faces", "Phonics Mm", "Buzz! Buzz!"] 
        },
        "Dec": { 
            title: "December: On the Farm", 
            wiki: "<b>Educational Goal:</b> Understanding numbers 1-3 and farm animals.<br><b>教學目標：</b>學習數字 1-3 和農場動物 (Cow, Pig, Duck)。", 
            weeks: ["Farm Animals", "Counting 1-2-3", "Phonics Pp", "Winter Review"] 
        },
        "Jan": { 
            title: "January: At the Zoo", 
            wiki: "<b>Educational Goal:</b> Wild animals and numbers 4-5. Public rules.<br><b>教學目標：</b>認識野生動物 (Panda, Tiger) 和數字 4-5。學習字母 T。", 
            weeks: ["Zoo Visit", "Photo Time", "Phonics Tt", "Zoo Rules"] 
        },
        "Feb": { 
            title: "February: On the Road", 
            wiki: "<b>Educational Goal:</b> Transport names and traffic safety (Stop/Go).<br><b>教學目標：</b>認識交通工具 (Bus, Car) 和交通規則。學習字母 C。", 
            weeks: ["Transport", "Oops! My Bike", "Phonics Cc", "Traffic Lights"] 
        },
       "Mar": { 
            title: "March: Family Visit", 
            wiki: "<b>Educational Goal:</b> Family members and polite greetings (How are you?).<br><b>教學目標：</b>認識家庭成員 (Grandma, Grandpa) 和禮貌問候。學習字母 U。", 
            weeks: ["A Visit", "More Family", "Phonics Uu", "Family Review"] 
        },
        "Apr": { 
            title: "April: My Pets", 
            wiki: "<b>Educational Goal:</b> Pet names and expressing possession (I have...).<br><b>教學目標：</b>認識寵物 (Bird, Rabbit) 和表達擁有 (I have...)。學習字母 R。", 
            weeks: ["My Pets", "Fast & Slow Pets", "Phonics Rr", "Pets Review"] 
        },
        "May": { 
            title: "May: Color Fun", 
            wiki: "<b>Educational Goal:</b> Identifying colors and asking questions (What color is it?).<br><b>教學目標：</b>認識顏色 (Red, Blue) 和提問。學習字母 O。", 
            weeks: ["Primary Colors", "More Colors", "Phonics Oo", "Color Review"] 
        },
        "Jun": { 
            title: "June: In the Park", 
            wiki: "<b>Educational Goal:</b> Nature vocabulary and describing objects with colors.<br><b>教學目標：</b>認識公園事物 (Flower, Kite) 並結合顏色描述。學習字母 I。", 
            weeks: ["Nature Walk", "Park Fun", "Phonics Ii", "Park Review"] 
        },
        "Jul": { 
            title: "July: Yummy Food", 
            wiki: "<b>Educational Goal:</b> Food names and expressing preferences (I like...).<br><b>教學目標：</b>認識食物和飲料 (Cake, Milk) 及表達喜好。學習字母 J。", 
            weeks: ["Yummy Food", "Drinks", "Phonics Jj", "Food Review"] 
        },
        "Aug": { 
            title: "August: Fruit & Review", 
            wiki: "<b>Educational Goal:</b> Fruit names, numbers, and course review.<br><b>教學目標：</b>認識水果 (Apple, Banana)、數字與總複習。學習字母 A。", 
            weeks: ["I Like Fruit", "More Fruit", "Phonics Aa", "Final Review"] 
        }
    };

    const monthListEl = document.getElementById('month-list');
    const contentAreaEl = document.getElementById('content-area');
    const y = document.getElementById('year');
    if (y) y.textContent = String(new Date().getFullYear());

    function init() {
        const months = ["Sep", "Oct", "Nov", "Dec", "Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug"];
        
        months.forEach((m, index) => {
            const btn = document.createElement('button');
            btn.className = 'month-btn';
            btn.innerText = m;
            
            if (index === 0) {
                btn.classList.add('active');
                loadMonth(m, btn);
            }

            btn.onclick = () => loadMonth(m, btn);
            monthListEl.appendChild(btn);
        });
    }

    function loadMonth(monthKey, btn) {
        document.querySelectorAll('.month-btn').forEach(b => b.classList.remove('active'));
        if(btn) btn.classList.add('active');

        const data = curriculum[monthKey];
        const isComingSoon = data.active === false;

        let html = `
            <div class="wiki-box">
                <div class="wiki-title">Parent's Corner</div>
                <div class="wiki-content">${data.wiki}</div>
            </div>
            <div class="week-grid">
        `;

        data.weeks.forEach((weekTitle, index) => {
            const cardClass = isComingSoon ? "week-card coming-soon" : "week-card";
            const link = isComingSoon ? "#" : `lesson.html?m=${monthKey}&w=${index}`;
            
            html += `
                <a href="${link}" class="${cardClass}">
                    <div class="week-number">${index + 1}</div>
                    <span class="week-title">Week ${index + 1}</span>
                    <span class="week-desc">${weekTitle}</span>
                </a>
            `;
        });
        html += `</div>`;
        contentAreaEl.innerHTML = html;
    }

    init();
</script>
</body>
</html>
