<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Bank — LinguaLab</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet" />

    <style>
        :root {
            --primary: #22d3ee;
            --primary-light: #ecfeff;
            --accent: #f97316;
            --navy: #1f4e79;
            --bg: #f8fafc;
            --radius: 24px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: #0f172a;
            line-height: 1.6;
            padding-top: 80px;
        }

        /* --- NAVBAR (Ваш стиль) --- */
        .navbar {
            position: fixed; top: 0; left: 0; width: 100%; z-index: 1000;
            display: flex; align-items: center; justify-content: space-between;
            padding: 15px 40px;
            background: #fff; 
            box-shadow: 0 4px 20px rgba(0,0,0,.05);
            height: 80px; 
        }
        .navbar-left { display: flex; align-items: center; gap: 12px; }
        .nav-logo { height: 50px; width: auto; display: block; }
        .nav-title { font-size: 24px; font-weight: 800; color: var(--navy); }
        
        .navbar-right { display: flex; align-items: center; gap: 20px; }
        .navbar-right a { 
            color: var(--navy); font-weight: 600; text-decoration: none; 
            font-size: 14px; transition: 0.3s; 
        }
        .navbar-right a:hover { color: var(--primary); }

        /* --- HERO SECTION (Ваш стиль) --- */
        .hero-compact {
            padding: 60px 20px 140px;
            text-align: center;
            background: linear-gradient(135deg, #22d3ee, #a78bfa);
            color: #fff;
            position: relative;
            width: 100%;
        }
        .hero-compact h1 { font-size: 42px; font-weight: 800; margin-bottom: 10px; }
        .hero-info { 
            display: flex; justify-content: center; align-items: center; 
            gap: 20px; font-size: 18px; opacity: 0.95;
        }

        /* --- КОНТЕНТ --- */
        .content-wrapper {
            max-width: 1100px;
            margin: -100px auto 50px;
            position: relative;
            z-index: 10;
            padding: 0 20px;
        }

        /* Кнопки категорий (На базе ваших month-btn) */
        .category-container { 
            background: #fff; border-radius: var(--radius); padding: 30px 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08); margin-bottom: 40px;
            border: 1px solid #e2e8f0; text-align: center; 
            display: flex; flex-wrap: wrap; justify-content: center; gap: 10px;
        }
        .category-btn { 
            flex: 0 0 auto; border: none; padding: 12px 24px; border-radius: 99px;
            cursor: pointer; font-weight: 800; color: #475569; 
            transition: 0.2s; font-size: 15px; background: #f1f5f9;
        }
        .category-btn:hover { transform: translateY(-2px); filter: brightness(0.95); }
        .category-btn.active { 
            background: var(--navy); color: #fff; 
            box-shadow: 0 4px 15px rgba(31, 78, 121, 0.3); transform: scale(1.05);
        }

        /* Блок для родителей (Ваш wiki-box) */
        .wiki-box { 
            background: #fff7ed; border-left: 5px solid var(--accent); 
            padding: 30px; border-radius: 16px; margin-bottom: 30px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            display: flex; justify-content: space-between; align-items: center;
        }
        .wiki-text-area { flex-grow: 1; }
        .wiki-title { 
            font-weight: 800; color: #c2410c; margin-bottom: 10px; 
            text-transform: uppercase; font-size: 13px; letter-spacing: 1px;
        }
        .wiki-content { font-size: 15px; line-height: 1.6; color: #431407; }
        
        /* Счетчик прогресса */
        .progress-counter {
            background: #fff; color: var(--accent); font-weight: 800;
            padding: 10px 20px; border-radius: 99px; font-size: 18px;
            box-shadow: 0 4px 10px rgba(249, 115, 22, 0.15);
        }

        /* --- FLASHCARDS (Адаптация ваших week-card) --- */
        .flashcard-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); 
            gap: 25px; 
        }
        
        .flashcard-wrapper {
            background: transparent;
            height: 280px;
            perspective: 1000px;
            cursor: pointer;
        }
        .flashcard-wrapper:hover .flashcard-inner {
            box-shadow: 0 20px 40px rgba(34, 211, 238, 0.2);
        }
        .flashcard-inner {
            position: relative; width: 100%; height: 100%;
            text-align: center; transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1);
            transform-style: preserve-3d; border-radius: var(--radius);
            box-shadow: 0 4px 15px rgba(0,0,0,0.06);
        }
        .flashcard-wrapper.flipped .flashcard-inner {
            transform: rotateY(180deg);
        }

        .flashcard-front, .flashcard-back {
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden; border-radius: var(--radius);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 20px; box-sizing: border-box;
        }

        /* Лицевая сторона (Дети) */
        .flashcard-front {
            background: #fff;
            border: 2px solid transparent;
            transition: 0.3s;
        }
        .flashcard-front img {
            width: 100px; height: 100px; object-fit: contain; margin-bottom: 20px;
        }
        .flashcard-front h2 {
            font-size: 24px; font-weight: 800; color: var(--navy); margin: 0;
        }

        /* Обратная сторона (Родители) */
        .flashcard-back {
            background: var(--navy);
            color: #fff;
            transform: rotateY(180deg);
            border: 2px solid var(--navy);
        }
        .flashcard-back h3 { font-size: 24px; margin-bottom: 5px; color: var(--primary-light); }
        .flashcard-back p.pinyin { font-size: 16px; opacity: 0.8; margin-bottom: 5px; }
        .flashcard-back p.translation { font-size: 26px; font-weight: bold; margin-bottom: 15px; color: var(--primary); }
        .flashcard-back p.sentence { font-size: 14px; line-height: 1.4; border-top: 1px dashed rgba(255,255,255,0.2); padding-top: 15px; }

        /* --- ГЕЙМИФИКАЦИЯ (Popup) --- */
        #reward-popup {
            display: none; position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%); background: #fff;
            padding: 40px 60px; border-radius: var(--radius);
            box-shadow: 0 20px 60px rgba(0,0,0,0.2); z-index: 2000;
            text-align: center; border: 4px solid var(--accent);
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #reward-popup h2 { color: var(--accent); font-size: 36px; margin-bottom: 10px; }
        #reward-popup p { color: var(--navy); font-size: 18px; font-weight: 600; }
        
        @keyframes popIn {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }
        
        #overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.6); z-index: 1999; backdrop-filter: blur(3px);
        }

        footer { background: #0f172a; color: #94a3b8; padding: 40px 8%; text-align: center; margin-top: 50px; }

        @media (max-width: 600px) {
            .navbar { padding: 10px 20px; flex-direction: column; gap: 10px; height: auto; }
            .navbar-left { width: 100%; justify-content: center; }
            .navbar-right { width: 100%; justify-content: center; flex-wrap: wrap; border-top: 1px solid #f1f5f9; padding-top: 10px; }
            .hero-compact h1 { font-size: 32px; }
            .content-wrapper { margin-top: -80px; }
            .flashcard-grid { grid-template-columns: repeat(2, 1fr); gap: 15px; }
            .flashcard-wrapper { height: 240px; }
            .flashcard-front img { width: 70px; height: 70px; }
            .flashcard-front h2 { font-size: 18px; }
            .flashcard-back h3 { font-size: 18px; }
            .flashcard-back p.translation { font-size: 20px; }
            .wiki-box { flex-direction: column; text-align: center; gap: 15px; }
        }
    </style>
</head>
<body>

<header class="navbar">
    <div class="navbar-left">
        <img src="assets/img/logo.png" alt="LL" class="nav-logo" onerror="this.style.display='none'">
        <span class="nav-title">LinguaLab</span>
    </div>
    <nav class="navbar-right">
        <a href="grammar.html">Grammar Magic</a>
        <a href="vocabulary.html" style="color: var(--primary);">Word Bank</a>
        <a href="index.html">Main Page</a>
        <a href="parents.html">Wiki Parents</a>
    </nav>
</header>

<section class="hero-compact">
    <h1>Word Bank</h1>
    <div class="hero-info">
        <span>Tap, listen, and learn! 👆🎧</span>
    </div>
</section>

<div class="content-wrapper">
    <div class="category-container" id="category-list"></div>

    <div id="content-area"></div>
</div>

<div id="overlay"></div>
<div id="reward-popup">
    <h2>🎉 太棒了!</h2>
    <p>Все слова выучены!<br>All words learned!</p>
</div>

<footer>
  © <span id="year">2026</span> LinguaLab • Small lessons. Real progress. All rights reserved.
</footer>

<script>
    // БАЗА ДАННЫХ СЛОВАРЯ
    const dictionary = {
        "animals": { 
            title: "Animals (动物)", 
            wiki: "<b>Educational Goal:</b> Learn basic animal names. Tap the cards to hear the sound and flip for translation!<br><b>教學目標：</b>學習基本動物名稱。點擊卡片聽發音並查看翻譯！", 
            words: [
                { id: "dog", ru: "Собака", pinyin: "gǒu", zh: "狗", sentence: "Это собака. (这是一只狗。)", img: "https://cdn-icons-png.flaticon.com/512/616/616408.png" },
                { id: "cat", ru: "Кошка", pinyin: "māo", zh: "猫", sentence: "У меня есть кошка. (我有一只猫。)", img: "https://cdn-icons-png.flaticon.com/512/616/616430.png" },
                { id: "pig", ru: "Свинья", pinyin: "zhū", zh: "猪", sentence: "Свинья ест. (猪在吃东西。)", img: "https://cdn-icons-png.flaticon.com/512/616/616432.png" },
                { id: "cow", ru: "Корова", pinyin: "niú", zh: "牛", sentence: "Корова дает молоко. (牛产奶。)", img: "https://cdn-icons-png.flaticon.com/512/616/616438.png" }
            ] 
        },
        "food": { 
            title: "Food (食物)", 
            wiki: "<b>Educational Goal:</b> Recognize everyday food items.<br><b>教學目標：</b>認識日常食物。", 
            words: [
                { id: "apple", ru: "Яблоко", pinyin: "píng guǒ", zh: "苹果", sentence: "Я люблю яблоки. (我喜欢苹果。)", img: "https://cdn-icons-png.flaticon.com/512/415/415682.png" },
                { id: "bread", ru: "Хлеб", pinyin: "miàn bāo", zh: "面包", sentence: "Вкусный хлеб. (好吃的面包。)", img: "https://cdn-icons-png.flaticon.com/512/3014/3014498.png" }
            ] 
        },
        "transport": { 
            title: "Transport (交通)", 
            wiki: "<b>Educational Goal:</b> Vehicles and movement.<br><b>教學目標：</b>交通工具與移動。", 
            words: [
                { id: "car", ru: "Машина", pinyin: "qì chē", zh: "汽车", sentence: "Красная машина. (红色的汽车。)", img: "https://cdn-icons-png.flaticon.com/512/3097/3097180.png" }
            ] 
        }
    };

    let learnedCards = new Set();
    let currentCategoryWordsCount = 0;

    const categoryListEl = document.getElementById('category-list');
    const contentAreaEl = document.getElementById('content-area');

    function init() {
        const categories = Object.keys(dictionary);
        
        categories.forEach((catKey, index) => {
            const btn = document.createElement('button');
            btn.className = 'category-btn';
            btn.innerText = dictionary[catKey].title;
            
            if (index === 0) {
                btn.classList.add('active');
                loadCategory(catKey, btn);
            }

            btn.onclick = () => loadCategory(catKey, btn);
            categoryListEl.appendChild(btn);
        });
    }

    function loadCategory(catKey, btn) {
        // Сброс активных кнопок и прогресса
        document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
        if(btn) btn.classList.add('active');
        learnedCards.clear();

        const data = dictionary[catKey];
        currentCategoryWordsCount = data.words.length;

        // Блок Wiki и счетчик прогресса
        let html = `
            <div class="wiki-box">
                <div class="wiki-text-area">
                    <div class="wiki-title">Parent's Corner</div>
                    <div class="wiki-content">${data.wiki}</div>
                </div>
                <div class="progress-counter" id="progress-text">0 / ${currentCategoryWordsCount}</div>
            </div>
            <div class="flashcard-grid">
        `;

        // Генерация карточек
        data.words.forEach((word) => {
            html += `
                <div class="flashcard-wrapper" onclick="flipCard(this, '${word.id}')">
                    <div class="flashcard-inner">
                        <div class="flashcard-front">
                            <img src="${word.img}" alt="${word.ru}">
                            <h2>${word.ru}</h2>
                        </div>
                        <div class="flashcard-back">
                            <h3>${word.ru}</h3>
                            <p class="pinyin">${word.pinyin}</p>
                            <p class="translation">${word.zh}</p>
                            <p class="sentence">${word.sentence}</p>
                        </div>
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        contentAreaEl.innerHTML = html;
    }

    function flipCard(element, wordId) {
        element.classList.toggle('flipped');
        
        // Воспроизведение звука (раскомментируйте, когда добавите аудиофайлы)
        // let audio = new Audio(`assets/audio/${wordId}.mp3`);
        // audio.play();

        // Логика прогресса
        if (!learnedCards.has(wordId)) {
            learnedCards.add(wordId);
            document.getElementById('progress-text').innerText = `${learnedCards.size} / ${currentCategoryWordsCount}`;
            
            if (learnedCards.size === currentCategoryWordsCount) {
                setTimeout(showReward, 800);
            }
        }
    }

    function showReward() {
        const popup = document.getElementById('reward-popup');
        const overlay = document.getElementById('overlay');
        popup.style.display = 'block';
        overlay.style.display = 'block';
        
        setTimeout(() => {
            popup.style.display = 'none';
            overlay.style.display = 'none';
        }, 3500);
    }

    init();
</script>
</body>
</html>
